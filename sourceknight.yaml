project:
  sourceknight: 0.3
  name: Stripper_Discord

  dependencies:
    - name: sourcemod
      type: tar
      version: 1.12
      location: https://sm.alliedmods.net/smdrop/1.12/sourcemod-1.12.0-git7223-linux.tar.gz
      unpack:
        - source: /addons
          dest: /addons

    - name: stripper
      type: git
      repo: https://github.com/srcdslab/sm-plugin-stripper
      unpack:
        - source: /addons/sourcemod/scripting/include
          dest: /addons/sourcemod/scripting/include

    - name: discordwebhookapi
      type: git
      repo: https://github.com/srcdslab/sm-plugin-DiscordWebhookAPI
      unpack:
        - source: /include
          dest: /addons/sourcemod/scripting/include

  root: /
  output: /addons/sourcemod/plugins

  targets:
    - Stripper_Discord
